<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
    script-src 'self';
    img-src 'self' data:;
    object-src 'none';
    base-uri 'none';
    ">
    <script type="module" src="renderer.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Joel David</title>
</head>

<body>
    <div class="animated-background"></div>
    <div class="background-overlay"></div>
    <div class="content">
        <header class="topbar blur">
            <a class="topbar-button" href="#about" data-i18n="about"></a>
            <a class="topbar-button" href="#projects" data-i18n="projects"></a>
            <a class="topbar-button" href="#contact" data-i18n="contact"></a>
            <button id="language-toggle" class="topbar-button">
                <i class="fas fa-globe"></i>
                <label id="language-label" data-i18n="language"></label>
            </button>
        </header>
        <section class="about-section" id="about">
            <div class="vertical-elem-area">
                <p class="positive-suggestion" data-i18n="available-to-work"></p>
                <div class="horizontal-elem-area center">
                    <img src="./assets/img/profile-picture.JPEG" class="profile-picture">
                    <h1 data-i18n="my_name"></h1>
                </div>
            </div>
            <p class="large-text" data-i18n="about_me_description"></p>
        </section>

        <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">

            <p style="display: none;">
                <label>No llenes esto si eres humano: <input name="bot-field" /></label>
            </p>

            <div>
                <label for="name" data-i18n="name"></label>
                <input type="text" id="name" name="name" required>
            </div>

            <div>
                <label for="email" data-i18n="email"></label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="mensaje" data-i18n="message"></label>
                <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
            </div>

            <div>
                <button type="submit">Enviar Mensaje</button>
            </div>
        </form>
    </div>
</body>

</html>
